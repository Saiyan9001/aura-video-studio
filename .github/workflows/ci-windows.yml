name: CI - Windows

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main, develop ]
  workflow_dispatch:

env:
  DOTNET_VERSION: '8.0.x'
  SOLUTION_FILE: Aura.sln

jobs:
  build-and-package-windows:
    name: Build and Package (Windows)
    runs-on: windows-latest
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4
      
    - name: Setup .NET
      uses: actions/setup-dotnet@v4
      with:
        dotnet-version: ${{ env.DOTNET_VERSION }}
        
    - name: Setup MSBuild
      uses: microsoft/setup-msbuild@v2
      
    - name: Setup Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '20'
        cache: 'npm'
        cache-dependency-path: Aura.Web/package-lock.json
      
    - name: Restore dependencies
      run: dotnet restore ${{ env.SOLUTION_FILE }}
      
    - name: Build Core Projects
      run: |
        dotnet build Aura.Core/Aura.Core.csproj --configuration Release --no-restore
        dotnet build Aura.Providers/Aura.Providers.csproj --configuration Release --no-restore
        dotnet build Aura.Api/Aura.Api.csproj --configuration Release --no-restore
        
    - name: Run Unit Tests
      run: dotnet test Aura.Tests/Aura.Tests.csproj --configuration Release --no-build --verbosity normal --logger "trx;LogFileName=unit-tests.trx"
      
    - name: Build WinUI 3 App (x64)
      run: msbuild Aura.App/Aura.App.csproj /p:Configuration=Release /p:Platform=x64 /p:AppxBundle=Never /p:UapAppxPackageBuildMode=SideloadOnly /restore
      
    - name: Create artifacts directory
      run: |
        New-Item -ItemType Directory -Force -Path artifacts/windows/msix
        New-Item -ItemType Directory -Force -Path artifacts/windows/portable
        New-Item -ItemType Directory -Force -Path artifacts/windows/logs
      shell: powershell
      
    - name: Copy MSIX packages
      if: success()
      run: |
        if (Test-Path "Aura.App/AppPackages") {
          Copy-Item -Path Aura.App/AppPackages/**/*.msix -Destination artifacts/windows/msix/ -Recurse -ErrorAction SilentlyContinue
        }
        if (Test-Path "Aura.App/bin/x64/Release") {
          Copy-Item -Path Aura.App/bin/x64/Release/**/*.msix -Destination artifacts/windows/msix/ -Recurse -ErrorAction SilentlyContinue
        }
      shell: powershell
      
    - name: Generate checksums
      run: |
        if (Test-Path "artifacts/windows/msix") {
          Get-ChildItem -Path artifacts/windows/msix -Recurse -File | ForEach-Object {
            $hash = Get-FileHash -Path $_.FullName -Algorithm SHA256
            "$($hash.Hash)  $($_.Name)" | Out-File -Append artifacts/windows/checksums.txt
          }
        }
      shell: powershell
      
    - name: Upload Test Results
      if: always()
      uses: actions/upload-artifact@v4
      with:
        name: test-results-windows
        path: |
          **/TestResults/*.trx
          
    - name: Upload MSIX Packages
      if: success()
      uses: actions/upload-artifact@v4
      with:
        name: msix-packages
        path: |
          artifacts/windows/msix/**/*.msix
          artifacts/windows/checksums.txt
        if-no-files-found: warn
          
    - name: Upload Build Logs
      if: always()
      uses: actions/upload-artifact@v4
      with:
        name: build-logs
        path: artifacts/windows/logs
        if-no-files-found: ignore
    
    - name: Build Portable ZIP
      if: success()
      run: |
        pwsh -File scripts/packaging/make_portable_zip.ps1 -Configuration Release -Platform x64
      shell: powershell
      
    - name: Run Smoke Test
      if: success()
      run: |
        Write-Host "Running smoke test..." -ForegroundColor Cyan
        
        # Extract the portable ZIP to a test directory
        $testDir = Join-Path $env:TEMP "aura-smoke-test"
        if (Test-Path $testDir) { Remove-Item $testDir -Recurse -Force }
        New-Item -ItemType Directory -Force -Path $testDir | Out-Null
        
        Expand-Archive -Path "artifacts/windows/portable/AuraVideoStudio_Portable_x64.zip" -DestinationPath $testDir -Force
        
        # Start the API in the background
        Write-Host "Starting API server..." -ForegroundColor Yellow
        $apiProcess = Start-Process -FilePath "$testDir/api/Aura.Api.exe" -ArgumentList "--urls", "http://127.0.0.1:5006" -WorkingDirectory "$testDir/api" -PassThru -WindowStyle Hidden
        
        try {
          # Wait for API to be ready (max 30 seconds)
          Write-Host "Waiting for API to be ready..." -ForegroundColor Yellow
          $maxAttempts = 30
          $attempts = 0
          $ready = $false
          
          while ($attempts -lt $maxAttempts) {
            Start-Sleep -Seconds 1
            $attempts++
            try {
              $response = Invoke-WebRequest -Uri "http://127.0.0.1:5006/healthz" -UseBasicParsing -TimeoutSec 2
              if ($response.StatusCode -eq 200) {
                Write-Host "API is ready!" -ForegroundColor Green
                $ready = $true
                break
              }
            } catch {
              # Continue waiting
            }
          }
          
          if (-not $ready) {
            throw "API did not start within 30 seconds"
          }
          
          # Run a quick test - just check that the API responds
          Write-Host "Testing API endpoints..." -ForegroundColor Yellow
          
          # Test health endpoint
          $health = Invoke-WebRequest -Uri "http://127.0.0.1:5006/healthz" -UseBasicParsing
          if ($health.StatusCode -ne 200) {
            throw "Health check failed"
          }
          Write-Host "  ✓ Health check passed" -ForegroundColor Green
          
          # Test that static files are being served
          $index = Invoke-WebRequest -Uri "http://127.0.0.1:5006/" -UseBasicParsing
          if ($index.StatusCode -ne 200) {
            throw "Static files not being served"
          }
          Write-Host "  ✓ Static files served" -ForegroundColor Green
          
          Write-Host ""
          Write-Host "========================================" -ForegroundColor Green
          Write-Host " Smoke Test PASSED" -ForegroundColor Green
          Write-Host "========================================" -ForegroundColor Green
          
        } finally {
          # Clean up: stop the API process
          Write-Host "Cleaning up..." -ForegroundColor Yellow
          if ($apiProcess -and -not $apiProcess.HasExited) {
            Stop-Process -Id $apiProcess.Id -Force
          }
          
          # Clean up test directory
          if (Test-Path $testDir) {
            Remove-Item $testDir -Recurse -Force
          }
        }
      shell: powershell
      
    - name: Upload Portable ZIP
      if: success()
      uses: actions/upload-artifact@v4
      with:
        name: portable-zip
        path: |
          artifacts/windows/portable/AuraVideoStudio_Portable_x64.zip
          artifacts/windows/portable/AuraVideoStudio_Portable_x64.zip.sha256
        if-no-files-found: error
